name: CI

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose run --build --rm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux musl static
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-amd64
            ext: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-arm64
            ext: ""
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-amd64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-arm64
            ext: ""
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-amd64
            ext: ".exe"
          - target: i686-pc-windows-msvc
            os: windows-latest
            name: windows-x86
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: windows-arm64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux musl cross-compilation via zig
      - if: contains(matrix.target, 'linux-musl')
        uses: mlugg/setup-zig@v2
      - if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@cargo-zigbuild
      - if: contains(matrix.target, 'linux-musl')
        name: Build (Linux musl)
        run: cargo zigbuild --release --target ${{ matrix.target }}

      # macOS / Windows native build
      - if: "!contains(matrix.target, 'linux-musl')"
        name: Build (native)
        run: cargo build --release --target ${{ matrix.target }}

      # Package — Unix
      - if: runner.os != 'Windows'
        name: Package (tar.gz)
        run: |
          chmod +x "target/${{ matrix.target }}/release/trim${{ matrix.ext }}"
          tar -czf "trim-${{ matrix.name }}.tar.gz" \
              -C "target/${{ matrix.target }}/release" "trim${{ matrix.ext }}"

      # Package — Windows
      - if: runner.os == 'Windows'
        name: Package (zip)
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/trim${{ matrix.ext }}" `
              -DestinationPath "trim-${{ matrix.name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: trim-${{ matrix.name }}
          path: trim-${{ matrix.name }}.*
          retention-days: 30
