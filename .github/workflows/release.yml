name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose run --build --rm test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: amd64
          - target: aarch64-unknown-linux-musl
            suffix: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - uses: taiki-e/install-action@cargo-zigbuild
      - name: Build
        run: |
          TRIM_VERSION="${GITHUB_REF_NAME#v}"
          export TRIM_VERSION
          cargo zigbuild --release --target ${{ matrix.target }}
          chmod +x "target/${{ matrix.target }}/release/trim"
          tar -czf "trim-linux-${{ matrix.suffix }}.tar.gz" \
              -C "target/${{ matrix.target }}/release" trim
      - uses: actions/upload-artifact@v4
        with:
          name: trim-linux-${{ matrix.suffix }}
          path: trim-linux-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
